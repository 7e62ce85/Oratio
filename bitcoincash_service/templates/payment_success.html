<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; padding-top: 50px; }
        .success-container { text-align: center; max-width: 600px; margin: 0 auto; }
        .success-icon { font-size: 4em; color: #28a745; margin-bottom: 20px; }
        .message { margin-top: 20px; font-size: 1.5em; color: #28a745; font-weight: bold; }
        .details { margin-top: 30px; color: #555; }
        .btn-primary { margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-container">
            <div class="success-icon">✓</div>
            <div class="message">Payment Successful!</div>
            <div class="details">
                <div class="card">
                    <div class="card-body">
                        <p>Your payment for invoice <strong>{{ invoice_id }}</strong> has been confirmed.</p>
                        {% if tx_hash %}
                        <p>Transaction Hash: <a href="https://blockchair.com/bitcoin-cash/transaction/{{ tx_hash }}" target="_blank" class="text-decoration-none">{{ tx_hash }}</a></p>
                        {% endif %}
                        <p>Your account has been credited with the payment amount.</p>
                    </div>
                </div>
                <a href="/" class="btn btn-primary">Return to Payment Service</a>
                <a href="https://defadb.com/" class="btn btn-outline-secondary">Return to defadb.com</a>
            </div>
        </div>
    </div>
</body>
</html>
